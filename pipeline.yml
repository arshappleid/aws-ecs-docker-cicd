name: Deploy Backend Service

on:
    push:
        branches: ["dev"]
        paths:
            - "backend/**"
            - ".aws/ecs-flaskapi-taskDefinition.json"
    workflow_run:
        workflows: ["Build Base Image"]
        types: [completed]
        branches: ["dev"]
env:
    AWS_REGION: us-east-1
    ECR_REPOSITORY_BASE: company-backend-base
    ECR_REPOSITORY_NAME: company-backend-service1
    ECS_SERVICE: service1
    ECS_CLUSTER: company-backend-ecs-cluster
    ECS_TASK_DEFINITION: .aws/ecs-flaskapi-taskDefinition.json
    GITHUB_ACTION_IAM_ROLE: arn:aws:iam::156041414531:role/Github-actions-backend
    CONTAINER_NAME: flask-api
    REPO_ROOT_FOLDER_NAME: backend
    UNIT_TEST_PATH: backend/tests/unit
    API_TESTS_PATH: backend/tests/api

permissions:
    id-token: write
    contents: read

jobs:
    build:
        name: Build Source Code
        runs-on: ubuntu-24.04-arm
        timeout-minutes: 10
        if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
        outputs:
            image: ${{ steps.build-image.outputs.image }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.workflow_run.head_sha || github.sha }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v1
              with:
                  role-to-assume: ${{ env.GITHUB_ACTION_IAM_ROLE }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v1

            - name: Build and push ${{ env.ECR_REPOSITORY_NAME }} image
              id: build-image
              env:
                  ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                  IMAGE_TAG: ${{ github.sha }}
              run: |
                  # Use latest base image from ECR
                  BASE_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY_BASE:latest"
                  sed "s|FROM maroon-base:latest|FROM $BASE_IMAGE|" $REPO_ROOT_FOLDER_NAME/Dockerfile | \
                      docker build --platform linux/arm64 -t $ECR_REGISTRY/$ECR_REPOSITORY_NAME:$IMAGE_TAG -f - .
                  docker push $ECR_REGISTRY/$ECR_REPOSITORY_NAME:$IMAGE_TAG
                  echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_NAME:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

    unit_test:
        name: Unit Testing
        runs-on: ubuntu-24.04-arm
        needs: build
        if: ${{ needs.build.result == 'success' }}
        timeout-minutes: 10

        steps:
            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v1
              with:
                  role-to-assume: ${{ env.GITHUB_ACTION_IAM_ROLE }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v1

            - name: Pull image
              env:
                  ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                  IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}
              run: docker pull $ECR_REGISTRY/$ECR_REPOSITORY_NAME:$IMAGE_TAG
              
            - name: Run Trivy Vulnerability Scanner
              uses: aquasecurity/trivy-action@master
              with:
                  image-ref: 'my-app:latest'
                  format: 'table'
                  # Exit code '1' means fail the GitHub Actions run if issues are found
                  exit-code: '1'
                  ignore-unfixed: true
                  vuln-type: 'os,library'
                  severity: 'CRITICAL,HIGH'
            
            - name: Start container
              env:
                  ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                  IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}
              run: |
                  docker run -d \
                    --name backend-test \
                    $ECR_REGISTRY/$ECR_REPOSITORY_NAME:$IMAGE_TAG \
                    tail -f /dev/null

            - name: Run pytest
              run: docker exec backend-test pytest ${{ env.UNIT_TEST_PATH }} -v

            - name: Stop container
              if: always()
              run: docker rm -f backend-test
    static-scan:
        name: Static Application Security Testing (SAST)
        runs-on: ubuntu-latest
        steps:
          - name: Checkout Code
            uses: actions/checkout@v4
    
          # Using Semgrep for fast, accurate static analysis
          - name: Run Semgrep SAST
            uses: semgrep/semgrep-action@v1
            with:
              config: p/security-audit
              # Fail the build if vulnerabilities are found
              auditOnFailure: false
    
    deploy:
        name: Deploy Backend Service
        runs-on: ubuntu-24.04-arm
        needs: [build, unit_test]
        if: ${{ needs.unit_test.result == 'success' }}
        timeout-minutes: 10

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.workflow_run.head_sha || github.sha }}

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v1
              with:
                  role-to-assume: ${{ env.GITHUB_ACTION_IAM_ROLE }}
                  aws-region: ${{ env.AWS_REGION }}
                  
            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v1
              
            - name: Fill in the new image ID in task definition
              id: task-def
              uses: aws-actions/amazon-ecs-render-task-definition@v1
              env:
                  ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                  IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}
              with:
                  task-definition: ${{ env.ECS_TASK_DEFINITION }}
                  container-name: ${{ env.CONTAINER_NAME }}
                  image: ${{ env.ECR_REGISTRY }}/${{env.ECR_REPOSITORY_NAME}}:${{env.IMAGE_TAG}}

            - name: Deploy Amazon ECS task definition
              uses: aws-actions/amazon-ecs-deploy-task-definition@v1
              with:
                  task-definition: ${{ steps.task-def.outputs.task-definition }}
                  service: ${{ env.ECS_SERVICE }}
                  cluster: ${{ env.ECS_CLUSTER }}
                  wait-for-service-stability: false

    api_test:
        name: API Testing
        runs-on: ubuntu-24.04-arm
        needs: deploy
        timeout-minutes: 15

        steps:
            - name: Wait 3 minutes for service to stabilize
              run: sleep 180

            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.workflow_run.head_sha || github.sha }}

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "24"

            - name: Install Bruno CLI
              run: npm install -g @usebruno/cli@3

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v1
              with:
                  role-to-assume: ${{ env.GITHUB_ACTION_IAM_ROLE }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Get Cognito access token
              id: cognito
              env:
                  COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
                  COGNITO_REFRESH_TOKEN: ${{ secrets.COGNITO_REFRESH_TOKEN }}
              run: |
                  RESPONSE=$(aws cognito-idp initiate-auth \
                      --region ${{ env.AWS_REGION }} \
                      --auth-flow REFRESH_TOKEN_AUTH \
                      --client-id "$COGNITO_CLIENT_ID" \
                      --auth-parameters REFRESH_TOKEN="$COGNITO_REFRESH_TOKEN" \
                      --query 'AuthenticationResult.AccessToken' \
                      --output text)
                  echo "access_token=$RESPONSE" >> $GITHUB_OUTPUT

            - name: Run Bruno demo collection
              working-directory: ${{ env.API_TESTS_PATH }}
              run: |
                  bru run \
                    --env prod \
                    --env-var api_access_token="${{ steps.cognito.outputs.access_token }}" \
                    --env-var platform_name="GitHub Actions" \
                    --env-var build_id="${{ github.run_id }}" \
                    --env-var commit_sha="${{ github.sha }}"
